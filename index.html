    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, serverTimestamp, doc, updateDoc, deleteDoc, query, where, orderBy, limit, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        window.firebaseApp = initializeApp;
        window.getFirestore = getFirestore;
        window.collection = collection;
        window.addDoc = addDoc;
        window.onSnapshot = onSnapshot;
        window.serverTimestamp = serverTimestamp;
        window.doc = doc;
        window.updateDoc = updateDoc;
        window.deleteDoc = deleteDoc;
        window.query = query;
        window.where = where;
        window.orderBy = orderBy; 
        window.limit = limit;     
        window.getDocs = getDocs; 
        window.getAuth = getAuth;
        window.signInAnonymously = signInAnonymously;
        window.onAuthStateChanged = onAuthStateChanged;
        
        window.dispatchEvent(new Event('firebase-loaded'));
    </script>

            position: absolute;
            background-color: #ffb7c5;
            border-radius: 15px 0 15px 0;
            opacity: 0.8;
            box-shadow: 0 0 10px rgba(255, 183, 197, 0.5);
            animation: fall linear infinite, sway ease-in-out infinite alternate;
        }

        @keyframes fall { 0% { top: -10%; } 100% { top: 110%; } }
        @keyframes sway { 0% { transform: translateX(0) rotate(0deg); } 100% { transform: translateX(30px) rotate(45deg); } }

        @keyframes float-up-fade {
            0% { transform: translate(-50%, 0) scale(0.5); opacity: 0; }
            20% { transform: translate(-50%, -20px) scale(1.2); opacity: 1; }
            80% { transform: translate(-50%, -40px) scale(1); opacity: 1; }

        .custom-scrollbar::-webkit-scrollbar { width: 8px; }

            70% { box-shadow: 0 0 0 6px rgba(239, 68, 68, 0); }

        const CherryBlossomBackground = () => {
            const petals = React.useMemo(() => {
                return Array.from({ length: 30 }).map((_, i) => ({
                    id: i, 
                    left: `${Math.random() * 100}%`,

        function App() {
            const [isFirebaseLoaded, setIsFirebaseLoaded] = useState(false);
            const [user, setUser] = useState(null);
            const [db, setDb] = useState(null);
            const appId = 'xx-school-typing-app';

            const [view, setView] = useState('login');
            const [rooms, setRooms] = useState([]);
            const [scores, setScores] = useState([]);
            const [currentTime, setCurrentTime] = useState(Date.now());
            
            const [nickname, setNickname] = useState('');
            const [selectedRoomId, setSelectedRoomId] = useState('');
            const [roomCodeInput, setRoomCodeInput] = useState(''); 
            const [myRoomData, setMyRoomData] = useState(null);     

            const [teacherPwd, setTeacherPwd] = useState('');
            const [pwdError, setPwdError] = useState('');
            const [newRoomName, setNewRoomName] = useState('');
            const [roomMode, setRoomMode] = useState('ko'); 
            const [roomDuration, setRoomDuration] = useState('300'); 
            const [viewingRoomId, setViewingRoomId] = useState(''); 

            const [gameMode, setGameMode] = useState('ko');
            const [gameDuration, setGameDuration] = useState(300);
            const [timeLeft, setTimeLeft] = useState(300);
            const [currentWord, setCurrentWord] = useState('');
            const [inputValue, setInputValue] = useState('');
            const [score, setScore] = useState(0);
            const [correctChars, setCorrectChars] = useState(0); 
            const inputRef = useRef(null);

            const [combo, setCombo] = useState(0);
            const [showSuccess, setShowSuccess] = useState(false);
            const [lastEarned, setLastEarned] = useState(0);
            const [isError, setIsError] = useState(false);
            
            const [isPracticeMode, setIsPracticeMode] = useState(false);

            const [boosterAvailable, setBoosterAvailable] = useState(true);
            const [boosterActive, setBoosterActive] = useState(false);
            const [boosterTimeLeft, setBoosterTimeLeft] = useState(0);

            const [announcements, setAnnouncements] = useState([]);
            const [showAnnouncementModal, setShowAnnouncementModal] = useState(false);
            const [annTitle, setAnnTitle] = useState('');
            const [annContent, setAnnContent] = useState('');
            const [editingAnnId, setEditingAnnId] = useState(null);
            
            // 🌟 팝업 공지사항용 추가 상태
            const [annIsAlert, setAnnIsAlert] = useState(false);
            const [hasSeenAlert, setHasSeenAlert] = useState(false);

            const [currentScoreDocId, setCurrentScoreDocId] = useState(null);
            const latestScoreRef = useRef(0);
            const latestCharsRef = useRef(0);
            const lastSyncedScoreRef = useRef(0);
            const gameInfoRef = useRef({ elapsed: 0 });

            const audioCtxRef = useRef(null);
            const lastProcessedSyncRef = useRef(0); 

            useEffect(() => {
                const clock = setInterval(() => setCurrentTime(Date.now()), 1000);
                return () => clearInterval(clock);
            }, []);

            useEffect(() => {
                const handleFirebaseLoad = () => setIsFirebaseLoaded(true);
                window.addEventListener('firebase-loaded', handleFirebaseLoad);
                if (window.firebaseApp) setIsFirebaseLoaded(true); 
                return () => window.removeEventListener('firebase-loaded', handleFirebaseLoad);
            }, []);

            useEffect(() => {
                if (!isFirebaseLoaded) return;
                try {
                    const app = window.firebaseApp(firebaseConfig);
                    const database = window.getFirestore(app);
                    const auth = window.getAuth(app);
                    setDb(database);

                    window.signInAnonymously(auth).catch(e => console.error(e));
                    window.onAuthStateChanged(auth, setUser);
                } catch (error) { console.error(error); }
            }, [isFirebaseLoaded]);

            // 1. 방 목록 & 공통 공지사항
            useEffect(() => {
                if (!user || !db) return;
                let unsubscribeRooms = () => {};
                
                if (view === 'teacher') {
                    const roomsRef = window.collection(db, 'artifacts', appId, 'public', 'data', 'typing_rooms');
                    const roomsQuery = window.query(roomsRef, window.orderBy('createdAt', 'desc'), window.limit(20));
                    unsubscribeRooms = window.onSnapshot(roomsQuery, (snapshot) => {
                        const roomData = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                        setRooms(roomData);
                    });
                }

                const annRef = window.collection(db, 'artifacts', appId, 'public', 'data', 'typing_announcements');
                const unsubscribeAnn = window.onSnapshot(annRef, (snapshot) => {
                    const annData = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    annData.sort((a, b) => (b.createdAt?.toMillis() || 0) - (a.createdAt?.toMillis() || 0));
                    setAnnouncements(annData);
                });

                return () => { unsubscribeRooms(); unsubscribeAnn(); };
            }, [user, db, view]);

            // 🌟 1-1. 학생이 처음 로그인 화면에 오면 팝업 공지가 있는지 확인하고 띄워주기
            useEffect(() => {
                if (view === 'login' && !hasSeenAlert && announcements.length > 0) {
                    const hasAlert = announcements.some(ann => ann.isAlert);
                    if (hasAlert) {
                        setShowAnnouncementModal(true);
                        setHasSeenAlert(true); // 한 번 봤으면 새로고침 전까지는 안 띄움
                    }
                }
            }, [view, announcements, hasSeenAlert]);

            // 2. 점수 데이터 
            useEffect(() => {
                if (!user || !db) return;
                let unsubscribeScores = () => {};

                if (view === 'teacher') {
                    if (viewingRoomId === '') {
                        setScores([]); 
                        return;
                    }
                    const scoresRef = window.collection(db, 'artifacts', appId, 'public', 'data', 'typing_scores');
                    if (viewingRoomId === 'all') {
                        unsubscribeScores = window.onSnapshot(scoresRef, (snapshot) => {
                            const scoreData = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                            setScores(scoreData);
                        });
                    } else {
                        const q = window.query(scoresRef, window.where("roomId", "==", viewingRoomId));
                        unsubscribeScores = window.onSnapshot(q, (snapshot) => {
                            const scoreData = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                            setScores(scoreData);
                        });
                    }
                }
                else if (currentScoreDocId) {
                    const myScoreRef = window.doc(db, 'artifacts', appId, 'public', 'data', 'typing_scores', currentScoreDocId);
                    unsubscribeScores = window.onSnapshot(myScoreRef, (docSnap) => {
                        if (docSnap.exists()) {
                            setScores([{ id: docSnap.id, ...docSnap.data() }]); 
                        }
                    });
                } else {
                    setScores([]); 
                }

                return () => unsubscribeScores();
            }, [user, db, view, viewingRoomId, currentScoreDocId]);

            // 3. 학생 전용: 내가 입장한 방 감시
            useEffect(() => {
                if (!user || !db || !selectedRoomId || view === 'teacher') return;
                
                const myRoomRef = window.doc(db, 'artifacts', appId, 'public', 'data', 'typing_rooms', selectedRoomId);
                const unsubscribeMyRoom = window.onSnapshot(myRoomRef, (docSnap) => {
                    if (docSnap.exists()) {
                        const rData = { id: docSnap.id, ...docSnap.data() };
                        setMyRoomData(rData);
                        
                        if (view === 'waiting' && rData.status === 'playing') {
                            const myScoreDoc = scores.find(s => s.id === currentScoreDocId);
                            let myDifficulty = rData.mode;
                            if (myScoreDoc?.difficulty === 'hard') myDifficulty = 'mixed';
                            if (myScoreDoc?.difficulty === 'hell') myDifficulty = 'en'; 
                            
                            setGameMode(myDifficulty);
                            pickRandomWord(myDifficulty);
                            setView('playing'); 
                        }
                    }
                });
                return () => unsubscribeMyRoom();
            }, [user, db, selectedRoomId, view, scores, currentScoreDocId]);

            useEffect(() => {
                latestScoreRef.current = score;
                latestCharsRef.current = correctChars;
            }, [score, correctChars]);

            // 4. 트래픽 0건! 선생님 갱신 신호 감지
            useEffect(() => {
                if (view !== 'playing' || isPracticeMode || !currentScoreDocId || !selectedRoomId || !db) return;
                
                if (myRoomData && myRoomData.syncRequestedAt && myRoomData.syncRequestedAt > lastProcessedSyncRef.current) {
                    lastProcessedSyncRef.current = myRoomData.syncRequestedAt; 
                    
                    const currentScore = latestScoreRef.current;
                    if (currentScore > lastSyncedScoreRef.current) {
                        const elapsedMin = gameInfoRef.current.elapsed / 60;
                        const currentCpm = elapsedMin > 0 ? Math.round(latestCharsRef.current / elapsedMin) : 0;

                        const docRef = window.doc(db, 'artifacts', appId, 'public', 'data', 'typing_scores', currentScoreDocId);
                        window.updateDoc(docRef, {
                            score: currentScore, cpm: currentCpm, updatedAt: window.serverTimestamp()
                        }).catch(e => console.error(e));
                        
                        lastSyncedScoreRef.current = currentScore;
                    }
                }
            }, [myRoomData, view, isPracticeMode, currentScoreDocId, selectedRoomId, db]);

            const playComboSound = (comboLevel) => {
                try {
                    const AudioContext = window.AudioContext || window.webkitAudioContext;
                    if (!audioCtxRef.current && AudioContext) audioCtxRef.current = new AudioContext();
                    if (!audioCtxRef.current || audioCtxRef.current.state === 'suspended') return;

                    const oscillator = audioCtxRef.current.createOscillator();
                    const gainNode = audioCtxRef.current.createGain();
                    
                    oscillator.connect(gainNode);
                    gainNode.connect(audioCtxRef.current.destination);
                    
                    const frequency = 400 + (Math.min(comboLevel, 20) * 40);
                    oscillator.type = 'sine';
                    oscillator.frequency.setValueAtTime(frequency, audioCtxRef.current.currentTime);
                    
                    gainNode.gain.setValueAtTime(0.15, audioCtxRef.current.currentTime);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtxRef.current.currentTime + 0.1);
                    
                    oscillator.start();
                    oscillator.stop(audioCtxRef.current.currentTime + 0.1);
                } catch (e) { }
            };

            const toggleDifficulty = async (scoreId, currentDiff) => {
                let newDiff = 'normal';
                if (currentDiff === 'normal') newDiff = 'hard';
                else if (currentDiff === 'hard') newDiff = 'hell'; 
                else newDiff = 'normal'; 
                
                try {
                    await window.updateDoc(window.doc(db, 'artifacts', appId, 'public', 'data', 'typing_scores', scoreId), { difficulty: newDiff });
                } catch (e) { console.error(e); }
            };

            const handleCreateRoom = async (e) => {
                e.preventDefault();
                if (!newRoomName.trim() || !user || !db) return;

                const durationSec = Number(roomDuration);
                const roomCode = Math.floor(1000 + Math.random() * 9000).toString(); 

                const roomsRef = window.collection(db, 'artifacts', appId, 'public', 'data', 'typing_rooms');
                await window.addDoc(roomsRef, {
                    name: newRoomName.trim(), mode: roomMode, duration: durationSec,
                    roomCode: roomCode, 
                    status: 'waiting', 
                    createdBy: user.uid, createdAt: window.serverTimestamp()
                });
                setNewRoomName('');
            };

            const startRoomGame = async (roomId) => {
                try {
                    const room = rooms.find(r => r.id === roomId);
                    const expiresAt = Date.now() + (room.duration * 1000); 
                    
                    await window.updateDoc(window.doc(db, 'artifacts', appId, 'public', 'data', 'typing_rooms', roomId), { 
                        status: 'playing',
                        expiresAt: expiresAt
                    });
                } catch (e) { console.error(e); }
            };

            const requestScoreSync = async (roomId) => {
                if (roomId === 'all') return alert("특정 반을 선택한 상태에서만 점수를 가져올 수 있습니다.");
                try {
                    await window.updateDoc(window.doc(db, 'artifacts', appId, 'public', 'data', 'typing_rooms', roomId), {
                        syncRequestedAt: Date.now() 
                    });
                } catch (e) { console.error(e); }
            };

            const handleSaveAnnouncement = async (e) => {
                e.preventDefault();
                if (!annTitle.trim() || !annContent.trim()) return alert("제목과 내용을 입력하세요.");
                try {
                    if (editingAnnId) {
                        await window.updateDoc(window.doc(db, 'artifacts', appId, 'public', 'data', 'typing_announcements', editingAnnId), {
                            // 🌟 수정 시에도 팝업 설정 저장
                            title: annTitle, content: annContent, isAlert: annIsAlert, updatedAt: window.serverTimestamp()
                        });
                        setEditingAnnId(null);
                    } else {
                        await window.addDoc(window.collection(db, 'artifacts', appId, 'public', 'data', 'typing_announcements'), {
                            // 🌟 생성 시에도 팝업 설정 저장
                            title: annTitle, content: annContent, isAlert: annIsAlert, createdAt: window.serverTimestamp()
                        });
                    }
                    // 🌟 폼 비우기
                    setAnnTitle(''); setAnnContent(''); setAnnIsAlert(false);
                } catch (e) { alert("저장 실패: " + e.message); }
            };

            const handleDeleteAnnouncement = async (id) => {
                if (!window.confirm("이 공지사항을 삭제하시겠습니까?")) return;
                try {
                    await window.deleteDoc(window.doc(db, 'artifacts', appId, 'public', 'data', 'typing_announcements', id));
                } catch (e) { alert("삭제 실패: " + e.message); }
            };

            const editAnnouncement = (ann) => {
                setEditingAnnId(ann.id); setAnnTitle(ann.title); setAnnContent(ann.content); 
                // 🌟 수정 버튼 누르면 팝업 설정도 불러오기
                setAnnIsAlert(ann.isAlert || false);
            };

            const handleDeleteRoom = async (roomId, roomName) => {
                if(!window.confirm(`정말 [${roomName}] 반을 삭제하시겠습니까?\n기록은 유지되지만 반 목록에서 삭제됩니다.`)) return;
                try {
                    await window.deleteDoc(window.doc(db, 'artifacts', appId, 'public', 'data', 'typing_rooms', roomId));
                    if (viewingRoomId === roomId) setViewingRoomId(''); 
                } catch (e) { alert('삭제 실패: ' + e.message); }
            };

            const startPractice = () => {
                if (!nickname.trim()) return alert("닉네임을 입력해주세요.");
                
                try {
                    const AudioContext = window.AudioContext || window.webkitAudioContext;
                    if (!audioCtxRef.current && AudioContext) audioCtxRef.current = new AudioContext();
                    if (audioCtxRef.current && audioCtxRef.current.state === 'suspended') audioCtxRef.current.resume();
                } catch(e){}

                setGameDuration(300);
                setTimeLeft(300);
                setGameMode('mixed'); 
                setScore(0);
                setCorrectChars(0);
                setCombo(0);
                setInputValue('');
                setIsPracticeMode(true);
                setCurrentScoreDocId(null);
                
                setBoosterAvailable(true);
                setBoosterActive(false);
                setBoosterTimeLeft(0);

                pickRandomWord('mixed');
                setView('playing');
            };

            const handleJoinRoom = async () => {
                if (!nickname.trim()) return alert("닉네임을 입력해주세요.");
                if (roomCodeInput.length !== 4) return alert("4자리 코드를 입력해주세요.");

                try {
                    const roomsRef = window.collection(db, 'artifacts', appId, 'public', 'data', 'typing_rooms');
                    const q = window.query(roomsRef, window.where('roomCode', '==', roomCodeInput), window.where('status', '==', 'waiting'));
                    const querySnapshot = await window.getDocs(q);

                    if (querySnapshot.empty) {
                        return alert("입장 코드가 틀렸거나, 이미 시작/마감된 방입니다!");
                    }

                    const roomDoc = querySnapshot.docs[0];
                    const roomId = roomDoc.id;
                    const roomData = roomDoc.data();

                    setSelectedRoomId(roomId);
                    setMyRoomData({ id: roomId, ...roomData });

                    try {
                        const AudioContext = window.AudioContext || window.webkitAudioContext;
                        if (!audioCtxRef.current && AudioContext) audioCtxRef.current = new AudioContext();
                        if (audioCtxRef.current && audioCtxRef.current.state === 'suspended') audioCtxRef.current.resume();
                    } catch(e){}

                    const scoresRef = window.collection(db, 'artifacts', appId, 'public', 'data', 'typing_scores');
                    const newDoc = await window.addDoc(scoresRef, {
                        roomId: roomId, nickname: nickname, score: 0, cpm: 0,
                        difficulty: 'normal', 
                        userId: user.uid, createdAt: window.serverTimestamp(), updatedAt: window.serverTimestamp()
                    });
                    setCurrentScoreDocId(newDoc.id);
                    lastSyncedScoreRef.current = 0;

                    const duration = roomData.duration || 300;
                    setGameDuration(duration);
                    setTimeLeft(duration);
                    setScore(0);
                    setCorrectChars(0);
                    setCombo(0);
                    setInputValue('');
                    setIsPracticeMode(false);
                    
                    setBoosterAvailable(true);
                    setBoosterActive(false);
                    setBoosterTimeLeft(0);
                    
                    setView('waiting'); 

                } catch (e) {
                    console.error(e);
                    alert("방 접속 중 오류가 발생했습니다.");
                }
            };

            const pickRandomWord = (modeStr) => {
                let list;
                if (modeStr === 'ko') list = KOREAN_WORDS;
                else if (modeStr === 'en') list = ENGLISH_WORDS; 
                else list = [...KOREAN_WORDS, ...ENGLISH_WORDS]; 
                
                const randomIndex = Math.floor(Math.random() * list.length);
                setCurrentWord(list[randomIndex]);
            };

            useEffect(() => {
                let timerId;
                if (view === 'playing' && timeLeft > 0) {
                    timerId = setInterval(() => {
                        setTimeLeft(prev => prev - 1);
                        
                        setBoosterTimeLeft(prevTime => {
                            if (prevTime > 1) return prevTime - 1;
                            if (prevTime === 1) {
                                setBoosterActive(false); 
                                return 0;
                            }
                            return 0;
                        });

                    }, 1000);
                } else if (view === 'playing' && timeLeft === 0) {
                    endGame();
                }
                gameInfoRef.current.elapsed = gameDuration - timeLeft;
                return () => clearInterval(timerId);
            }, [view, timeLeft, gameDuration]);

            const handleKeyDown = (e) => {
                if (e.key === 'Backspace') setCombo(0);

                const isSentence = currentWord.includes(' ');
                if (e.key === 'Enter' || (!isSentence && e.key === ' ')) {
                    e.preventDefault(); 
                    if (inputValue.length === 0) return;

                    if (inputValue.trim() === currentWord) {
                        const newCombo = combo + 1;
                        
                        const baseScore = currentWord.length * 10;
                        const effectiveCombo = Math.min(combo, 10);
                        const comboBonus = effectiveCombo * currentWord.length * 2;
                        const lengthBonus = currentWord.includes(' ') ? 50 : (currentWord.length > 5 ? 20 : 0);
                        
                        let earnedScore = baseScore + comboBonus + lengthBonus;
                        
                        if (boosterActive) {
                            earnedScore = Math.floor(earnedScore * 1.5);
                        }
                        
                        setScore(prev => prev + earnedScore);
                        setCorrectChars(prev => prev + currentWord.length);
                        setCombo(newCombo);
                        setLastEarned(earnedScore);
                        
                        playComboSound(newCombo);
                        setShowSuccess(true);
                        setTimeout(() => setShowSuccess(false), 500);
                        
                        setInputValue('');
                        pickRandomWord(gameMode);
                    } else {
                        setCombo(0);
                        setIsError(true);
                        setTimeout(() => setIsError(false), 400);
                    }
                }
            };

            const endGame = async () => {
                setView('result');
                
                if (isPracticeMode) {
                    setIsPracticeMode(false);
                    return;
                }

                if (!user || !db || !currentScoreDocId) return;

                const minutes = gameDuration / 60;
                const cpm = minutes > 0 ? Math.round(correctChars / minutes) : 0;

                try {
                    const docRef = window.doc(db, 'artifacts', appId, 'public', 'data', 'typing_scores', currentScoreDocId);
                    await window.updateDoc(docRef, { score: score, cpm: cpm, updatedAt: window.serverTimestamp() });
                } catch (error) { }
                setCurrentScoreDocId(null);
            };

            const formatTime = (sec) => `${Math.floor(sec/60)}:${(sec%60).toString().padStart(2,'0')}`;

            const getLeaderboard = () => {
                const userBest = {};
                
                scores.forEach(s => {
                    if (viewingRoomId !== 'all' && s.roomId !== viewingRoomId) return;
                    if (viewingRoomId !== 'all' && !rooms.find(r => r.id === s.roomId)) return; 
                    
                    if (!userBest[s.nickname] || userBest[s.nickname].score < s.score) {
                        userBest[s.nickname] = s;
                    }
                });
                
                return Object.values(userBest).sort((a, b) => b.score - a.score);
            };

            
            if (!isFirebaseLoaded) return null;

            if (view === 'login') {
                return (
                    <div className="min-h-screen spring-bg flex items-center justify-center p-4">
                        <CherryBlossomBackground />
                        
                        {/* 공지사항 모달창 */}
                        {showAnnouncementModal && (
                            <div className="fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4 backdrop-blur-sm">
                                <div className="bg-white rounded-3xl p-6 max-w-md w-full max-h-[80vh] overflow-y-auto custom-scrollbar shadow-2xl relative">
                                    <button onClick={() => setShowAnnouncementModal(false)} className="absolute top-4 right-5 text-gray-400 hover:text-pink-500 text-3xl font-black">&times;</button>
                                    <h2 className="text-2xl font-black text-pink-600 mb-6 flex items-center gap-2">📢 공지사항</h2>
                                    <div className="space-y-4">
                                        {announcements.length > 0 ? announcements.map(ann => (
                                            /* 🌟 팝업 설정된 공지는 빨간색 테두리로 강조 표시! */
                                            <div key={ann.id} className={`p-4 rounded-2xl border text-left ${ann.isAlert ? 'bg-red-50 border-red-200 shadow-sm' : 'bg-pink-50/50 border-pink-100'}`}>
                                                <h3 className="font-bold text-lg text-gray-800 mb-2">
                                                    {ann.isAlert && <span className="text-red-500 mr-1 animate-pulse">🚨</span>}
                                                    {ann.title}
                                                </h3>
                                                <p className="text-gray-600 whitespace-pre-wrap text-sm leading-relaxed">{ann.content}</p>
                                                <div className="text-xs text-gray-400 mt-3 text-right">
                                                    {ann.createdAt?.toDate ? ann.createdAt.toDate().toLocaleDateString() : ''}
                                                </div>
                                            </div>
                                        )) : <p className="text-gray-500 text-center py-8 font-medium">등록된 공지사항이 없습니다.</p>}
                                    </div>
                                    {/* 🌟 팝업으로 열렸을 때 닫기 버튼 하나 더 제공 (사용성 증가) */}
                                    <button onClick={() => setShowAnnouncementModal(false)} className="w-full mt-6 py-3 bg-pink-100 text-pink-600 font-bold rounded-xl hover:bg-pink-200">닫기</button>
                                </div>
                            </div>
                        )}

                        <button onClick={() => setShowAnnouncementModal(true)} className="absolute top-4 right-4 bg-white/80 hover:bg-white text-pink-600 px-4 py-2 rounded-full text-sm font-bold shadow-md border border-pink-200 transition-all flex items-center gap-2 z-20">
                            📢 공지사항 {announcements.length > 0 && <span className="bg-pink-500 text-white w-5 h-5 flex items-center justify-center rounded-full text-xs animate-bounce">{announcements.length}</span>}
                        </button>
                        <div className="glass-box rounded-3xl p-8 md:p-10 text-center max-w-md w-full z-10 relative shadow-2xl border-2 border-pink-200">
                            <div className="text-6xl mb-2 animate-bounce">⚔️🔥</div>
                            
                            <h1 className="text-4xl md:text-5xl font-black mb-3 italic tracking-tighter text-transparent bg-clip-text bg-gradient-to-r from-purple-600 via-pink-500 to-orange-400 drop-shadow-sm">
                                풍양중<br/>키보드 배틀
                            </h1>
                            
                            <p className="text-gray-600 font-bold mb-8 tracking-wide">
                                🏆 누가 최고의 타자왕이 될 것인가?
                            </p>
                            
                            <div className="space-y-4">
                                <button onClick={() => setView('studentLobby')} className="w-full py-4 bg-gradient-to-r from-pink-500 to-rose-500 hover:from-pink-600 hover:to-rose-600 text-white rounded-2xl font-bold text-lg shadow-lg shadow-pink-300 transition-all flex items-center justify-center gap-2 transform hover:scale-105">
                                    🧑‍🎓 선수 입장
                                </button>
                                <button onClick={() => {setPwdError(''); setView('teacherLogin');}} className="w-full py-4 bg-white hover:bg-gray-50 text-gray-700 rounded-2xl font-bold text-lg border-2 border-pink-200 transition-all flex items-center justify-center gap-2">
                                    👩‍🏫 교무실(관리자) 접속
                                </button>
                            </div>
                        </div>
                    </div>
                );
            }

            if (view === 'teacherLogin') {
                return (
                    <div className="min-h-screen spring-bg flex items-center justify-center p-4">
                        <CherryBlossomBackground />
                        <div className="glass-box rounded-3xl p-10 text-center max-w-md w-full z-10 relative">
                            <button onClick={() => setView('login')} className="absolute top-6 left-6 text-gray-400 hover:text-gray-600 font-medium">← 뒤로</button>
                            <div className="text-5xl mb-4 mt-4">🔐</div>
                            <h1 className="text-2xl font-bold text-gray-800 mb-2">교무실 인증</h1>
                            <p className="text-gray-500 mb-6">선생님 전용 비밀번호를 입력해주세요.</p>
                            <form onSubmit={(e) => { e.preventDefault(); teacherPwd === '0327' ? (setView('teacher'), setTeacherPwd(''), setPwdError('')) : setPwdError('비밀번호가 일치하지 않습니다.'); }}>
                                <input type="password" value={teacherPwd} onChange={(e) => setTeacherPwd(e.target.value)} placeholder="비밀번호 입력" className="w-full px-4 py-4 bg-white border border-pink-200 outline-none focus:ring-2 focus:ring-pink-400 text-gray-800 rounded-2xl mb-2 text-center tracking-widest text-lg" />
                                {pwdError && <p className="text-red-500 text-sm mb-4">{pwdError}</p>}
                                <button type="submit" className="w-full py-4 bg-gray-800 hover:bg-gray-900 text-white rounded-2xl font-bold text-lg shadow-lg mt-4">인증하기</button>
                            </form>
                        </div>
                    </div>
                );
            }

            if (view === 'teacher') {
                const leaderboardScores = getLeaderboard();
                
                return (
                    <div className="min-h-screen spring-bg p-4 md:p-8">
                        <CherryBlossomBackground />
                        <div className="max-w-6xl mx-auto space-y-6 z-10 relative">
                            <div className="glass-box p-6 rounded-3xl flex justify-between items-center">
                                <div>
                                    <h1 className="text-2xl font-bold text-gray-800 flex items-center gap-2">🏫 교무실 타자 점수 관리</h1>
                                    <p className="text-gray-500 mt-1 font-medium">실시간으로 학생들의 점수를 확인하세요!</p>
                                </div>
                                <button onClick={() => setView('login')} className="px-5 py-2 bg-white border border-gray-200 text-gray-600 rounded-xl font-medium hover:bg-gray-50">로그아웃</button>
                            </div>

                            <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                                <div className="glass-box p-6 rounded-3xl col-span-1 h-fit">
                                    <h2 className="text-lg font-bold text-gray-800 mb-4 flex items-center gap-2">📝 학급(반) 관리</h2>
                                    <form onSubmit={handleCreateRoom} className="space-y-4 mb-6 border-b border-pink-100 pb-6">
                                        <input type="text" value={newRoomName} onChange={(e) => setNewRoomName(e.target.value)} placeholder="예: 1학년 3반" className="w-full px-4 py-3 border border-pink-200 rounded-xl outline-none focus:ring-2 focus:ring-pink-400" required />
                                        <div className="grid grid-cols-2 gap-3">
                                            <select value={roomMode} onChange={(e) => setRoomMode(e.target.value)} className="w-full px-3 py-3 border border-pink-200 rounded-xl outline-none bg-white font-medium text-gray-700">
                                                <option value="ko">한글 전용</option>
                                                <option value="en">영어 전용</option>
                                                <option value="mixed">한/영 혼합</option>
                                            </select>
                                            <select value={roomDuration} onChange={(e) => setRoomDuration(e.target.value)} className="w-full px-3 py-3 border border-pink-200 rounded-xl outline-none bg-white">
                                                <option value="60">1분</option><option value="120">2분</option><option value="180">3분</option><option value="240">4분</option><option value="300">5분</option>
                                            </select>
                                        </div>
                                        <button type="submit" className="w-full bg-pink-500 hover:bg-pink-600 py-3 rounded-xl font-bold text-white shadow-md">반 만들기</button>
                                    </form>

                                    <div className="space-y-2 max-h-80 overflow-y-auto pr-2 custom-scrollbar">
                                        <div onClick={() => setViewingRoomId('all')} className={`p-3 rounded-xl cursor-pointer transition-all border font-medium flex justify-between items-center ${viewingRoomId === 'all' ? 'bg-pink-50 border-pink-300 text-pink-700' : 'bg-white border-transparent hover:bg-pink-50 text-gray-600'}`}>
                                            <span>학교 전체 보기</span>
                                        </div>
                                        {rooms.map(r => {
                                            const isExpired = r.expiresAt && currentTime > r.expiresAt;
                                            return (
                                            <div key={r.id} onClick={() => setViewingRoomId(r.id)} className={`p-3 rounded-xl cursor-pointer transition-all border flex flex-col gap-1 ${viewingRoomId === r.id ? 'bg-pink-50 border-pink-300 text-pink-700' : 'bg-white border-gray-100 hover:bg-pink-50 text-gray-600'}`}>
                                                <div className="flex justify-between items-center">
                                                    <div>
                                                        <span className="font-bold">{r.name} <span className="text-blue-500 font-black ml-2 bg-blue-50 px-2 py-1 rounded">코드: {r.roomCode}</span></span>
                                                    </div>
                                                    <button onClick={(e) => { e.stopPropagation(); handleDeleteRoom(r.id, r.name); }} className="text-red-300 hover:text-red-500 px-2 text-lg transition-colors" title="이 반 삭제하기">🗑️</button>
                                                </div>
                                               <div className="text-[11px] font-bold mt-1">
                                                    <span className="text-gray-400 mr-2">
                                                        {r.mode === 'ko' ? '한글' : r.mode === 'en' ? '영어' : '한/영'} | {r.duration/60}분
                                                    </span>
                                                    {isExpired ? 
                                                        <span className="text-red-400">마감됨</span> : 
                                                        <span className="text-pink-500 animate-pulse">입장 가능</span>
                                                    }
                                                </div>
                                            </div>
                                        )})}
                                    </div>
                                </div>

                                <div className="glass-box p-6 rounded-3xl col-span-1 lg:col-span-2">
                                    <h2 className="text-lg font-bold text-gray-800 mb-4 flex items-center justify-between">
                                        <div className="flex items-center gap-2">
                                            🏆 {viewingRoomId === 'all' ? '풍양중학교 전체 명예의 전당' : viewingRoomId === '' ? '학생 점수 확인 (반을 선택하세요)' : `[${rooms.find(r => r.id === viewingRoomId)?.name}] 실시간 명예의 전당`}
                                        </div>
                                        {viewingRoomId !== '' && <span className="bg-red-500 text-white text-xs px-2 py-1 rounded-full animate-pulse">🔴 LIVE</span>}
                                    </h2>
                                    
                                    {viewingRoomId !== '' && viewingRoomId !== 'all' && (
                                        <div className="flex gap-2 mb-6">
                                            {rooms.find(r => r.id === viewingRoomId)?.status === 'waiting' && (
                                                <button onClick={() => startRoomGame(viewingRoomId)} className="flex-1 py-4 bg-pink-500 hover:bg-pink-600 text-white rounded-2xl font-black text-xl shadow-lg animate-pulse">
                                                    🚀 전원 타자 연습 시작!
                                                </button>
                                            )}
                                            {rooms.find(r => r.id === viewingRoomId)?.status === 'playing' && (
                                                <button 
                                                    onClick={(e) => {
                                                        requestScoreSync(viewingRoomId);
                                                        const btn = e.currentTarget;
                                                        const originalText = btn.innerHTML;
                                                        btn.innerHTML = '✅ 학생들 점수 수집 완료!';
                                                        btn.classList.replace('bg-blue-500', 'bg-green-500');
                                                        setTimeout(() => {
                                                            btn.innerHTML = originalText;
                                                            btn.classList.replace('bg-green-500', 'bg-blue-500');
                                                        }, 1500);
                                                    }} 
                                                    className="flex-1 py-4 bg-blue-500 hover:bg-blue-600 text-white rounded-2xl font-black text-xl shadow-lg transition-all"
                                                >
                                                    🔄 실시간 점수 가져오기
                                                </button>
                                            )}
                                        </div>
                                    )}

                                    <div className="overflow-x-auto custom-scrollbar">
                                        <table className="w-full text-left border-collapse">
                                            <thead>
                                                <tr className="bg-pink-50 text-pink-800 text-sm">
                                                    <th className="py-3 px-4 font-bold rounded-tl-xl w-16 text-center">순위</th>
                                                    <th className="py-3 px-4 font-bold">학생(닉네임)</th>
                                                    <th className="py-3 px-4 font-bold text-center">난이도 설정</th>
                                                    <th className="py-3 px-4 font-bold text-right">최고 점수</th>
                                                    <th className="py-3 px-4 font-bold text-right rounded-tr-xl">타수(CPM)</th>
                                                </tr>
                                            </thead>
                                            <tbody>
                                                {leaderboardScores.length > 0 ? leaderboardScores.map((s, idx) => {
                                                    const isRecentlyUpdated = s.updatedAt && (Date.now() - s.updatedAt.toMillis() < 5000);
                                                    return (
                                                    <tr key={s.id} className={`border-b border-gray-100 transition-colors ${isRecentlyUpdated ? 'bg-yellow-50' : 'hover:bg-white/50'}`}>
                                                        <td className="py-3 px-4 text-center font-bold">
                                                            {idx === 0 ? '🥇' : idx === 1 ? '🥈' : idx === 2 ? '🥉' : <span className="text-gray-400">{idx + 1}</span>}
                                                        </td>
                                                        <td className="py-3 px-4 font-bold text-gray-800">
                                                            {s.nickname}
                                                            {isRecentlyUpdated && <span className="text-[10px] bg-green-500 text-white px-1.5 py-0.5 ml-2 rounded-full animate-bounce inline-block">UP!</span>}
                                                        </td>
                                                        
                                                        <td className="py-3 px-4 text-center">
                                                            {viewingRoomId !== 'all' && rooms.find(r => r.id === viewingRoomId)?.status === 'waiting' ? (
                                                                <button onClick={() => toggleDifficulty(s.id, s.difficulty || 'normal')} className={`px-3 py-1 rounded-full text-xs font-bold transition-all ${s.difficulty === 'hell' ? 'bg-purple-600 text-white' : s.difficulty === 'hard' ? 'bg-red-500 text-white' : 'bg-gray-200 text-gray-600 hover:bg-gray-300'}`}>
                                                                    {s.difficulty === 'hell' ? '💀 헬(영어)' : s.difficulty === 'hard' ? '🔥 하드(한/영)' : '🌱 일반'}
                                                                </button>
                                                            ) : (
                                                                <span className="text-xs text-gray-400 font-bold">
                                                                    {s.difficulty === 'hell' ? '💀 헬(영어)' : s.difficulty === 'hard' ? '🔥 하드' : '🌱 일반'}
                                                                </span>
                                                            )}
                                                        </td>

                                                        <td className="py-3 px-4 text-right font-black text-pink-500 text-lg">{s.score.toLocaleString()}</td>
                                                        <td className="py-3 px-4 text-right text-gray-500 font-medium">{s.cpm}타</td>
                                                    </tr>
                                                )}) : (
                                                    <tr><td colSpan="5" className="py-8 text-center text-gray-400">아직 등록된 기록이 없거나 선택된 반이 없습니다.</td></tr>
                                                )}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            </div>
                            
                            {/* 🌟 공지사항 관리 섹션 */}
                            <div className="glass-box p-6 rounded-3xl mt-6">
                                <h2 className="text-lg font-bold text-gray-800 mb-4 flex items-center gap-2">📢 공지사항 작성 및 관리</h2>
                                <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                                    <form onSubmit={handleSaveAnnouncement} className="space-y-3 bg-white p-5 rounded-2xl border border-pink-100 shadow-sm">
                                        <input type="text" value={annTitle} onChange={e => setAnnTitle(e.target.value)} placeholder="제목 (예: 🌸 5월 이달의 MVP 발표!)" className="w-full px-4 py-3 border border-pink-200 rounded-xl outline-none focus:ring-2 focus:ring-pink-400 font-bold" required />
                                        <textarea value={annContent} onChange={e => setAnnContent(e.target.value)} placeholder="학생들에게 알릴 내용을 적어주세요." rows="4" className="w-full px-4 py-3 border border-pink-200 rounded-xl outline-none resize-none custom-scrollbar focus:ring-2 focus:ring-pink-400" required />
                                        
                                        {/* 🌟 접속 시 팝업 띄우기 체크박스 */}
                                        <label className="flex items-center gap-2 text-sm font-bold text-gray-700 cursor-pointer p-2 bg-pink-50 rounded-lg border border-pink-100">
                                            <input type="checkbox" checked={annIsAlert} onChange={e => setAnnIsAlert(e.target.checked)} className="w-5 h-5 text-pink-500 rounded focus:ring-pink-400 cursor-pointer" />
                                            🚨 학생들이 처음 접속할 때 이 공지를 팝업으로 띄우기
                                        </label>

                                        <div className="flex gap-2 mt-2">
                                            <button type="submit" className="flex-1 bg-gray-800 text-white py-3 rounded-xl font-bold hover:bg-gray-900 transition-colors">{editingAnnId ? '수정 완료' : '새 공지 등록'}</button>
                                            {editingAnnId && <button type="button" onClick={() => {setEditingAnnId(null); setAnnTitle(''); setAnnContent(''); setAnnIsAlert(false);}} className="px-5 bg-gray-200 text-gray-600 rounded-xl font-bold hover:bg-gray-300 transition-colors">취소</button>}
                                        </div>
                                    </form>
                                    
                                    <div className="space-y-3 max-h-60 overflow-y-auto custom-scrollbar pr-2">
                                        {announcements.map(ann => (
                                            <div key={ann.id} className={`bg-white p-4 rounded-2xl border flex justify-between items-start gap-4 transition-colors ${ann.isAlert ? 'border-red-300 bg-red-50/30' : 'border-pink-100 hover:border-pink-300'}`}>
                                                <div className="flex-1">
                                                    <div className="font-bold text-gray-800 text-sm">
                                                        {ann.title}
                                                        {/* 🌟 팝업 설정된 글은 뱃지로 표시 */}
                                                        {ann.isAlert && <span className="bg-red-500 text-white text-[10px] px-2 py-0.5 rounded-full ml-2 animate-pulse align-middle">팝업 ON</span>}
                                                    </div>
                                                    <div className="text-xs text-gray-400 line-clamp-1 mt-1">{ann.content}</div>
                                                </div>
                                                <div className="flex gap-1 shrink-0">
                                                    <button onClick={() => editAnnouncement(ann)} className="text-blue-500 hover:bg-blue-50 p-2 rounded-lg transition-colors" title="수정">✏️</button>
                                                    <button onClick={() => handleDeleteAnnouncement(ann.id)} className="text-red-500 hover:bg-red-50 p-2 rounded-lg transition-colors" title="삭제">🗑️</button>
                                                </div>
                                            </div>
                                        ))}
                                        {announcements.length === 0 && <div className="text-center text-gray-400 py-10 bg-white rounded-2xl border border-pink-100">등록된 공지사항이 없습니다.</div>}
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                );
            }

            if (view === 'studentLobby') {
                return (
                    <div className="min-h-screen spring-bg flex items-center justify-center p-4">
                        <CherryBlossomBackground />
                        <div className="glass-box rounded-3xl p-10 max-w-md w-full z-10 relative shadow-xl">
                            <button onClick={() => setView('login')} className="absolute top-6 left-6 text-gray-400 hover:text-gray-600 font-medium">← 뒤로</button>
                            <div className="text-center mb-8 mt-4">
                                <div className="text-5xl mb-2 animate-bounce">🎒</div>
                                <h1 className="text-2xl font-bold text-gray-800">선수 입장</h1>
                                <p className="text-gray-500 text-sm mt-1">선생님이 알려주신 4자리 코드를 입력하세요!</p>
                            </div>
                            
                            <div className="space-y-4">
                                <div>
                                    <label className="text-sm font-bold text-gray-600 mb-1 block">내 닉네임 (이름)</label>
                                    <input type="text" value={nickname} onChange={(e) => setNickname(e.target.value)} placeholder="예: 홍길동" className="w-full px-4 py-4 bg-white border border-pink-200 outline-none focus:ring-2 focus:ring-pink-400 text-gray-800 rounded-2xl" maxLength="10" />
                                </div>
                                <div>
                                    <label className="text-sm font-bold text-gray-600 mb-1 block">입장 코드 (4자리 숫자)</label>
                                    <input type="text" value={roomCodeInput} onChange={(e) => setRoomCodeInput(e.target.value.replace(/[^0-9]/g, ''))} placeholder="예: 1234" className="w-full px-4 py-4 bg-white border border-pink-200 outline-none focus:ring-2 focus:ring-pink-400 text-gray-800 rounded-2xl text-center text-2xl tracking-[0.5em] font-black" maxLength="4" />
                                </div>

                                <button onClick={handleJoinRoom} disabled={!nickname || roomCodeInput.length !== 4} className="w-full py-4 mt-2 bg-pink-500 hover:bg-pink-600 disabled:bg-gray-300 disabled:cursor-not-allowed text-white rounded-2xl font-bold text-lg shadow-md transition-colors">
                                    본 게임 입장하기
                                </button>
                                
                                <button onClick={startPractice} disabled={!nickname} className="w-full py-4 bg-white border-2 border-pink-300 text-pink-600 hover:bg-pink-50 disabled:bg-gray-100 disabled:text-gray-400 disabled:border-gray-200 rounded-2xl font-bold text-lg shadow-sm transition-colors">
                                    🌱 자유 연습하기 (기록 미저장)
                                </button>
                            </div>
                        </div>
                    </div>
                );
            }

            if (view === 'waiting') {
                return (
                    <div className="min-h-screen spring-bg flex flex-col items-center justify-center p-4">
                        <CherryBlossomBackground />
                        <div className="glass-box rounded-3xl p-10 text-center max-w-md w-full z-10 relative shadow-xl">
                            <div className="text-6xl mb-6 animate-bounce">⏳</div>
                            <h1 className="text-2xl font-bold text-gray-800 mb-4">시작 대기 중...</h1>
                            <p className="text-gray-500 font-medium mb-6">[{myRoomData?.name}] 반에 입장했습니다.<br/>선생님이 시작할 때까지 손가락을 풀어주세요!</p>
                            <div className="w-full bg-pink-100 h-2 rounded-full overflow-hidden">
                                <div className="bg-pink-500 h-full animate-pulse" style={{ width: '100%' }}></div>
                            </div>
                        </div>
                    </div>
                );
            }

            if (view === 'playing') {
                const renderWord = () => {
                    return currentWord.split('').map((char, index) => {
                        let colorClass = "text-gray-400"; 
                        if (index < inputValue.length) {
                            if (inputValue[index] === char) {
                                colorClass = "text-pink-500 font-black"; 
                            } else {
                                colorClass = "text-red-500 bg-red-100 rounded underline decoration-wavy decoration-red-500"; 
                            }
                        }
                        return <span key={index} className={`transition-colors duration-100 ${colorClass}`}>{char}</span>;
                    });
                };

                return (
                    <div className={`min-h-screen flex flex-col p-4 md:p-8 relative overflow-hidden transition-colors duration-500 ${boosterActive ? 'booster-bg' : 'spring-bg'}`}>
                        <CherryBlossomBackground />
                        
                        <div className="absolute bottom-8 right-8 md:bottom-12 md:right-12 z-50">
                            <button 
                                onClick={() => {
                                    if(boosterAvailable && !boosterActive) {
                                        setBoosterAvailable(false);
                                        setBoosterActive(true);
                                        setBoosterTimeLeft(20); 
                                    }
                                }}
                                disabled={!boosterAvailable}
                                className={`w-24 h-24 md:w-32 md:h-32 rounded-full shadow-2xl font-black flex flex-col items-center justify-center transition-all transform ${boosterActive ? 'bg-gradient-to-r from-yellow-400 to-orange-500 text-white animate-pulse scale-110 shadow-orange-400' : boosterAvailable ? 'bg-gradient-to-r from-purple-500 to-pink-500 text-white hover:scale-105 hover:shadow-pink-400 cursor-pointer' : 'bg-gray-300 text-gray-500 cursor-not-allowed'}`}
                            >
                                {boosterActive ? (
                                    <>
                                        <span className="text-4xl md:text-5xl mb-1 drop-shadow-md">🔥</span>
                                        <span className="text-xl md:text-2xl">{boosterTimeLeft}초</span>
                                    </>
                                ) : boosterAvailable ? (
                                    <>
                                        <span className="text-4xl md:text-5xl mb-1 drop-shadow-md">🚀</span>
                                        <span className="text-sm md:text-base tracking-widest">부스터</span>
                                    </>
                                ) : (
                                    <>
                                        <span className="text-4xl md:text-5xl mb-1 opacity-50">💨</span>
                                        <span className="text-xs md:text-sm">사용됨</span>
                                    </>
                                )}
                            </button>
                        </div>

                        {showSuccess && (
                            <div className="animate-success-pop flex flex-col items-center">
                                <div className="text-4xl md:text-5xl font-black text-pink-500 drop-shadow-md italic">
                                    {combo > 1 ? `${combo} COMBO 🌸` : 'PERFECT!'}
                                </div>
                                <div className="text-2xl font-bold text-yellow-500 mt-1">+{lastEarned}</div>
                            </div>
                        )}

                        <div className="max-w-5xl w-full mx-auto glass-box rounded-3xl p-5 mb-8 flex flex-wrap justify-between items-center gap-4 z-10 shadow-sm">
                            <div className="flex items-center gap-4">
                                <div className="bg-white px-4 py-2 rounded-xl font-bold text-gray-700 border border-pink-100 shadow-sm flex items-center gap-2">
                                    🧑‍🎓 {nickname}
                                </div>
                                <div className={`flex items-center gap-2 px-4 py-2 rounded-xl border font-bold transition-all ${combo > 2 ? 'bg-pink-100 border-pink-300 text-pink-600 shadow-sm' : 'bg-white border-gray-200 text-gray-500'}`}>
                                    🔥 {combo} 콤보
                                </div>
                            </div>
                            <div className="flex items-center gap-6">
                                <div className="text-gray-500 font-medium text-lg">
                                    점수: <span className={`font-black text-2xl md:text-3xl transition-colors ${boosterActive ? 'text-orange-500 animate-pulse' : 'text-pink-500'}`}>{score.toLocaleString()}</span>
                                </div>
                                <div className={`font-mono text-2xl font-bold px-4 py-2 rounded-xl border ${timeLeft <= 60 ? 'bg-red-50 border-red-200 text-red-500 animate-pulse' : 'bg-white border-pink-200 text-gray-700'}`}>
                                    ⏱️ {formatTime(timeLeft)}
                                </div>
                            </div>
                        </div>

                        <div className="flex-1 flex flex-col items-center justify-center max-w-4xl w-full mx-auto -mt-10 md:-mt-20 z-10">
                            <div className="w-full text-center mb-8">
                                <p className="text-pink-400 font-bold tracking-widest text-sm mb-4">제시어</p>
                                <div className="text-4xl md:text-6xl font-black tracking-wide break-keep leading-tight min-h-[100px] text-gray-300">
                                    {renderWord()}
                                </div>
                            </div>

                            <div className={`w-full max-w-3xl relative rounded-2xl overflow-hidden transition-all duration-200 ${boosterActive ? 'shadow-[0_0_40px_rgba(251,191,36,0.5)] border-4 border-yellow-400 bg-white' : combo > 2 ? 'input-success' : 'glass-box'} ${isError ? 'border-2 border-red-400 animate-shake shadow-lg shadow-red-200' : 'border-2 border-transparent'}`}>
                                <input
                                    ref={inputRef}
                                    type="text"
                                    value={inputValue}
                                    onChange={(e) => {setInputValue(e.target.value); setIsError(false);}}
                                    onKeyDown={handleKeyDown}
                                    className={`w-full text-center text-2xl md:text-4xl py-6 md:py-8 px-6 outline-none bg-transparent font-bold transition-colors ${isError ? 'text-red-600' : 'text-gray-800'}`}
                                    placeholder={currentWord.includes(' ') ? "입력 후 엔터(Enter)를 누르세요" : "입력 후 스페이스바 또는 엔터"}
                                    autoFocus
                                    autoComplete="off"
                                    spellCheck="false"
                                />
                            </div>
                            
                            <p className="mt-8 text-gray-500 text-sm font-medium">
                                백스페이스(지우기)를 누르거나 오답 제출 시 <span className="text-red-400">콤보가 초기화</span>됩니다.
                            </p>
                            
                            <div className="w-full max-w-3xl h-2 bg-white/50 rounded-full mt-4 overflow-hidden border border-pink-100">
                                <div 
                                    className={`h-full transition-all duration-300 ${isError ? 'bg-red-400' : boosterActive ? 'bg-gradient-to-r from-yellow-400 to-orange-500' : 'bg-gradient-to-r from-pink-300 to-pink-500'}`}
                                    style={{ width: `${Math.min((inputValue.length / currentWord.length) * 100, 100)}%` }}
                                />
                            </div>
                        </div>
                    </div>
                );
            }

            if (view === 'result') {
                const minutes = gameDuration / 60;
                const finalCpm = minutes > 0 ? Math.round(correctChars / minutes) : 0;

                return (
                    <div className="min-h-screen spring-bg flex items-center justify-center p-4 relative overflow-hidden">
                        <CherryBlossomBackground />
                        
                        <div className="glass-box rounded-3xl p-10 text-center max-w-md w-full border border-pink-100 shadow-2xl z-10 relative">
                            <div className="w-24 h-24 bg-gradient-to-br from-pink-400 to-rose-400 text-white rounded-full flex items-center justify-center mx-auto mb-6 shadow-lg shadow-pink-200 text-5xl">
                                🏆
                            </div>
                            
                            <h1 className="text-3xl font-black text-gray-800 mb-2">연습 종료!</h1>
                            <p className="text-gray-500 mb-8 font-medium">
                                {isPracticeMode ? '자유 연습을 마쳤습니다. 실전 대결에 도전해보세요!' : '수고하셨습니다. 기록이 교무실로 전송되었습니다.'}
                            </p>
                            
                            <div className="bg-white rounded-2xl p-6 mb-8 border border-pink-100 shadow-sm">
                                <div className="text-sm text-gray-500 font-bold mb-1">최종 점수</div>
                                <div className="text-6xl font-black text-pink-500 mb-6">{score.toLocaleString()}</div>
                                
                                <div className="grid grid-cols-2 gap-4 border-t border-gray-100 pt-5">
                                    <div>
                                        <div className="text-xs text-gray-400 font-bold">분당 타수(CPM)</div>
                                        <div className="text-2xl font-black text-gray-700">{finalCpm} <span className="text-sm text-gray-400 font-medium">타</span></div>
                                    </div>
                                    <div>
                                        <div className="text-xs text-gray-400 font-bold">정확히 친 글자</div>
                                        <div className="text-2xl font-black text-gray-700">{correctChars} <span className="text-sm text-gray-400 font-medium">자</span></div>
                                    </div>
                                </div>
                            </div>

                            <button onClick={() => setView('login')} className="w-full py-4 bg-gray-800 hover:bg-gray-900 text-white rounded-2xl font-bold text-lg shadow-md transition-colors">
                                처음으로 돌아가기
                            </button>
                        </div>
                    </div>
                );
            }

            return null;
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
